<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>我的主页</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f2f2f2;
      }
      header,
      footer {
        background-color: #0078d7;
        color: #ffffff;
        padding: 20px;
      }
      header h1,
      footer p {
        margin: 0;
      }
      nav {
        margin-top: 10px;
      }
      nav a {
        color: #ffffff;
        margin-right: 15px;
        text-decoration: none;
      }
      main {
        padding: 20px;
        background-color: #ffffff;
      }
      main h2 {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>欢迎来到我的主页</h1>
      <nav>
        <a href="#">主页</a>
        <a href="#">关于我</a>
        <a href="#">联系我</a>
      </nav>
    </header>

    <main>
      <h2>关于我</h2>
      <p>这是我的个人简介。在这里，你可以了解我的兴趣、工作和联系方式。</p>
    </main>

    <footer>
      <p>&copy; 2023 我的名字</p>
    </footer>
  </body>
</html>
